<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Embedded Systems Skill Tree</title>
    <style>
        :root {
            /* Hexagon Geometry */
            --hex-w: 120px;
            --hex-h: 138.56px; /* Width * 1.1547 (pointy topped hexagon ratio) */
            --hex-margin: 5px;
            --hex-overlap: -34px; /* Approx Height * 0.25 to interlock rows */
            
            /* Colors */
            --bg-paper: #ffffff;
            --border-ink: #111111;
            --fill-color: #61dafb; /* A nice bright blue to mimic a highlighter */
            --text-color: #111111;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: #f0f0f0; /* Light grey backdrop */
            display: flex;
            justify-content: center;
            padding: 20px;
        }

        .poster-board {
            background-color: var(--bg-paper);
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
            padding: 30px 20px;
            max-width: 1100px;
            width: 100%;
            position: relative;
            border: 2px solid var(--border-ink);
            overflow: hidden;
        }

        .header {
            text-align: center;
            margin-bottom: 20px;
        }

        .header h1 {
            font-size: 3rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            color: var(--border-ink);
            margin-bottom: 5px;
        }

        .header p {
            font-size: 1rem;
            color: #555;
            font-style: italic;
        }

        .controls {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            padding: 0 20px;
        }

        .score-box {
            border: 3px solid var(--border-ink);
            background: var(--border-ink);
            color: white;
            padding: 8px 20px;
            font-size: 1.2rem;
            font-weight: bold;
            border-radius: 5px;
        }

        .reset-btn {
            background: white;
            border: 2px solid var(--border-ink);
            color: var(--border-ink);
            padding: 8px 15px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.2s;
        }

        .reset-btn:hover {
            background: var(--border-ink);
            color: white;
        }

        .tree-layout {
            display: flex;
            align-items: stretch;
            justify-content: center;
            gap: 20px;
            margin-top: 40px;
        }

        /* The Basics -> Advanced Progression Arrow */
        .progression-arrow {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: space-between;
            width: 50px;
            position: relative;
            padding: 40px 0;
        }

        .arrow-head {
            width: 0; 
            height: 0; 
            border-left: 25px solid transparent;
            border-right: 25px solid transparent;
            border-bottom: 35px solid var(--border-ink);
            position: absolute;
            top: 0;
        }

        .arrow-shaft {
            width: 15px;
            height: 100%;
            background: linear-gradient(to top, #999, var(--border-ink));
            position: absolute;
            top: 35px;
            bottom: 0;
            z-index: 0;
        }

        .arrow-label {
            z-index: 1;
            font-weight: 900;
            font-size: 1.5rem;
            color: white;
            writing-mode: vertical-rl;
            transform: rotate(180deg);
            text-transform: uppercase;
            letter-spacing: 4px;
            text-shadow: 0 0 5px rgba(0,0,0,0.8);
        }

        .label-adv { margin-top: 60px; }
        .label-bas { margin-bottom: 20px; }

        .honeycomb-wrapper {
            /* This wrapper allows responsive scaling down of the fixed grid */
            width: 100%;
            display: flex;
            justify-content: center;
            overflow-x: auto;
            padding-bottom: 20px;
        }

        .honeycomb-grid {
            display: flex;
            flex-direction: column;
            align-items: center;
            /* Scale down on smaller screens */
            transform-origin: top center;
        }

        .hex-row {
            display: flex;
            justify-content: center;
            margin-top: var(--hex-overlap);
        }

        .hex-row:first-child {
            margin-top: 0;
        }

        /* Hexagon Structure - Using clip-path */
        .hex-wrap {
            width: var(--hex-w);
            height: var(--hex-h);
            margin: 0 var(--hex-margin);
            clip-path: polygon(50% 0%, 100% 25%, 100% 75%, 50% 100%, 0% 75%, 0% 25%);
            background: var(--border-ink); /* This forms the border */
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: transform 0.15s ease-out;
            position: relative;
        }

        .hex-inner {
            /* Inner hex is slightly smaller to reveal the border */
            width: calc(var(--hex-w) - 4px);
            height: calc(var(--hex-h) - 4px);
            clip-path: polygon(50% 0%, 100% 25%, 100% 75%, 50% 100%, 0% 75%, 0% 25%);
            background: var(--bg-paper);
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 10px;
            text-align: center;
            transition: background 0.2s, color 0.2s;
        }

        .hex-content {
            font-size: 0.75rem;
            font-weight: 700;
            line-height: 1.2;
            color: var(--text-color);
            pointer-events: none; /* Prevents text selection while clicking */
        }

        @media (hover: hover) {
            .hex-wrap:hover {
                transform: scale(1.08);
                z-index: 10;
            }
        }

        .hex-wrap:active {
            transform: scale(0.95);
        }

        .hex-wrap.completed .hex-inner {
            background: var(--fill-color);
        }

        /* Responsive Scaling for the grid to fit on mobile */
        @media (max-width: 900px) {
            .honeycomb-grid { transform: scale(0.85); }
            .progression-arrow { width: 35px; }
            .arrow-label { font-size: 1.2rem; }
            .header h1 { font-size: 2rem; }
        }

        @media (max-width: 700px) {
            .honeycomb-grid { transform: scale(0.7); }
            .tree-layout { gap: 5px; }
            .poster-board { padding: 15px 5px; }
        }

        @media (max-width: 500px) {
            .honeycomb-grid { transform: scale(0.55); }
            .arrow-label { font-size: 1rem; }
            .controls { flex-direction: column; gap: 15px; }
        }
    </style>
</head>
<body>

    <div class="poster-board">
        <div class="header">
            <h1>Embedded Systems</h1>
            <p>Skill Tree: Click in the boxes to color your progress</p>
        </div>

        <div class="controls">
            <button class="reset-btn" id="resetBtn">Erase Board</button>
            <div class="score-box">
                Total Score: <span id="score">0</span> / <span id="total">45</span>
            </div>
        </div>

        <div class="tree-layout">
            <!-- Sidebar Progression Arrow -->
            <div class="progression-arrow">
                <div class="arrow-head"></div>
                <div class="arrow-shaft"></div>
                <div class="arrow-label label-adv">Advanced</div>
                <div class="arrow-label label-bas">Basics</div>
            </div>

            <!-- Hexagon Grid Container -->
            <div class="honeycomb-wrapper">
                <div class="honeycomb-grid" id="gridContainer">
                    <!-- Javascript will inject the hexagon rows here -->
                </div>
            </div>
        </div>
    </div>

    <script>
        
        // Exact 45 skills mapped to match the original layout request
        // Ordered from Most Advanced (Top) to Most Basic (Bottom)
        const flatSkills = [
            // TOP ROWS (Advanced - 17 total)
            "Add Machine Learning (ML) to a device", "Create your own custom PCB", "Design a low current circuit", "Write an Arduino Library", 
            "Create a CI/CD System", "Write a datasheet", "Trace debugging to troubleshoot a problem", "Write manufacturing test software", "Bit bang a communication driver",
            "Optimize assembly code", "Adapt RTOS to a new board", "Write custom BLE GATT", "Use multiple architectures in a software image",
            "Debug with a logic analyzer", "Modify a Linker File", "Reverse engineer a communication protocol", "Use Direct Memory Access (DMA)",
            
            // MIDDLE ROWS (Intermediate - 16 total)
            "Debug a hard fault on a microcontroller", "Use an IMU sensor", "Debug a project with an oscilloscope", "Set up a cross compiler", 
            "Bring up a custom board for the first time", "Analyze signal with Fast Fourier Transform", "Update firmware remotely (OTA)", "Use a Real Time Operating System (RTOS)", "Implement an interrupt service routine (ISR)",
            "Use a step-through debugger", "Understand a circular buffer", "Use Bluetooth Low Energy (BLE)",
            "Display text on a screen", "Use Pulse Width Modulation (PWM)", "Implement a state machine", "Move a motor",
            
            // BOTTOM ROWS (Basics - 12 total)
            "Send data to the cloud", "Configure a timer", "Convert a signal from analog to digital", "Use SPI to send/receive data", "Use I2C communication",
            "Use UART serial communication", "Debounce a button",
            "Use a Hardware Simulator", "Commit to version control", "Solder header pins", "Blink an LED",
            "Get an Arduino (START)"
        ];

        // The exact honeycomb shape alternating row lengths (Total = 45)
        const rowStructure = [4, 5, 4, 5, 4, 5, 4, 5, 4, 5];
        
        const gridContainer = document.getElementById('gridContainer');
        const scoreEl = document.getElementById('score');
        const totalEl = document.getElementById('total');
        
        // Load saved state
        let progress = JSON.parse(localStorage.getItem('embeddedHexSkills')) || {};
        let completedCount = 0;

        function updateScore() {
            scoreEl.textContent = completedCount;
        }

        // Handle Click Event
        function toggleHex(skillId, hexElement) {
            if (progress[skillId]) {
                delete progress[skillId];
                hexElement.classList.remove('completed');
                completedCount--;
            } else {
                progress[skillId] = true;
                hexElement.classList.add('completed');
                completedCount++;
            }
            localStorage.setItem('embeddedHexSkills', JSON.stringify(progress));
            updateScore();
        }

        let skillIndex = 0;
        totalEl.textContent = flatSkills.length;

        rowStructure.forEach(rowCount => {
            // Create a row container
            const rowDiv = document.createElement('div');
            rowDiv.className = 'hex-row';

            // Populate row with hexagons
            for (let i = 0; i < rowCount; i++) {
                if (skillIndex >= flatSkills.length) break;
                
                const skillName = flatSkills[skillIndex];
                const skillId = skillName.replace(/[^a-zA-Z0-9]/g, ''); 
                
                // Create Hex Wrap (Border)
                const hexWrap = document.createElement('div');
                hexWrap.className = 'hex-wrap';
                if (progress[skillId]) {
                    hexWrap.classList.add('completed');
                    completedCount++;
                }

                // Create Hex Inner (White background)
                const hexInner = document.createElement('div');
                hexInner.className = 'hex-inner';

                // Create Text Content
                const hexContent = document.createElement('span');
                hexContent.className = 'hex-content';
                hexContent.textContent = skillName;

                // Assemble and attach event
                hexInner.appendChild(hexContent);
                hexWrap.appendChild(hexInner);
                
                hexWrap.addEventListener('click', () => toggleHex(skillId, hexWrap));
                
                rowDiv.appendChild(hexWrap);
                skillIndex++;
            }
            gridContainer.appendChild(rowDiv);
        });

        // Initialize score display
        updateScore();

        // Reset functionality
        document.getElementById('resetBtn').addEventListener('click', () => {
            if(confirm("Are you sure you want to erase all your progress?")) {
                progress = {};
                completedCount = 0;
                localStorage.removeItem('embeddedHexSkills');
                document.querySelectorAll('.hex-wrap').forEach(el => el.classList.remove('completed'));
                updateScore();
            }
        });
    </script>
</body>
</html>
