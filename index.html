<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Embedded Systems Skill Tree</title>
    <style>
        :root {
            --bg-color: #121212;
            --container-bg: #1e1e1e;
            --card-bg: #2d2d2d;
            --text-main: #f0f0f0;
            --text-muted: #a9a9a9;
            --accent: #61dafb;
            --success: #2e7d32;
            --success-border: #4caf50;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body { 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; 
            background-color: var(--bg-color); 
            color: var(--text-main); 
            line-height: 1.6;
            padding: 0 0 40px 0;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 0 15px;
        }

        /* Sticky Header for Mobile/Desktop */
        .header-container {
            position: sticky;
            top: 0;
            background-color: rgba(18, 18, 18, 0.95);
            backdrop-filter: blur(8px);
            z-index: 100;
            padding: 20px 15px;
            border-bottom: 1px solid #333;
            margin-bottom: 30px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.3);
        }

        h1 { 
            text-align: center; 
            color: var(--accent); 
            font-size: 1.8rem;
            margin-bottom: 10px;
        }

        .score-board { 
            text-align: center; 
            font-size: 1.2rem; 
            font-weight: bold;
            color: var(--text-main);
        }

        .category { margin-bottom: 50px; }
        
        .category h2 { 
            border-bottom: 2px solid #333; 
            padding-bottom: 10px; 
            margin-bottom: 20px;
            color: var(--text-muted); 
            font-size: 1.5rem;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        /* Responsive Grid */
        .grid { 
            display: grid; 
            /* Automatically scales down to 140px wide columns on small phones, and expands on desktops */
            grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); 
            gap: 15px; 
        }

        .card { 
            background-color: var(--card-bg); 
            border: 2px solid #444; 
            border-radius: 10px; 
            padding: 15px 10px; 
            text-align: center; 
            cursor: pointer; 
            transition: transform 0.15s ease, background-color 0.2s ease, border-color 0.2s ease; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            min-height: 90px; 
            font-weight: 500; 
            font-size: 0.95rem;
            user-select: none;
            -webkit-tap-highlight-color: transparent; /* Removes blue flash on mobile tap */
        }

        /* Hover effects primarily for desktop */
        @media (hover: hover) {
            .card:hover { 
                transform: translateY(-3px); 
                border-color: var(--accent); 
                box-shadow: 0 4px 12px rgba(97, 218, 251, 0.15);
            }
        }

        /* Active state for mobile tapping */
        .card:active {
            transform: scale(0.96);
        }

        .card.completed { 
            background-color: var(--success); 
            border-color: var(--success-border); 
            color: #fff; 
            box-shadow: 0 0 15px rgba(76, 175, 80, 0.2); 
        }

        /* Mobile specific adjustments */
        @media (max-width: 600px) {
            h1 { font-size: 1.5rem; }
            .score-board { font-size: 1rem; }
            .category h2 { font-size: 1.2rem; }
            .grid { 
                grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); 
                gap: 10px;
            }
            .card {
                font-size: 0.85rem;
                min-height: 80px;
                padding: 10px;
            }
        }
    </style>
</head>
<body>

    <div class="header-container">
        <h1>Embedded Systems Skill Tree</h1>
        <div class="score-board">
            Sprint Progress: <span id="score" style="color: var(--accent);">0</span> / <span id="total">0</span>
        </div>
    </div>

    <div class="container" id="app"></div>

    <script>
        const skills = {
            "Basics": [
                "Get an Arduino (START)", "Blink an LED", "Solder header pins", "Commit to version control",
                "Use a Hardware Simulator", "Debounce a button", "Use UART serial communication", 
                "Use I2C communication", "Use SPI to send/receive data", "Convert a signal from analog to digital (ADC)",
                "Configure a timer", "Send data to the cloud"
            ],
            "Intermediate": [
                "Move a motor", "Implement a state machine", "Use Pulse Width Modulation (PWM)", 
                "Display text on a screen", "Use Bluetooth Low Energy (BLE)", "Understand a circular buffer",
                "Use a step-through debugger", "Implement an interrupt service routine (ISR)", 
                "Use a Real Time Operating System (RTOS)", "Update firmware remotely (OTA)", 
                "Analyze signal with Fast Fourier Transform (FFT)", "Bring up a custom board for the first time",
                "Set up a cross compiler", "Debug a project with an oscilloscope", "Use an IMU sensor", 
                "Debug a hard fault on a microcontroller"
            ],
            "Advanced": [
                "Use Direct Memory Access (DMA)", "Reverse engineer a communication protocol", 
                "Modify a Linker File", "Debug with a logic analyzer", "Use multiple architectures in a software image",
                "Write custom BLE GATT", "Adapt RTOS to a new board", "Optimize assembly code", 
                "Create your own custom PCB", "Bit bang a communication driver", "Write manufacturing test software",
                "Trace debugging to troubleshoot a problem", "Write a datasheet", "Create a CI/CD System",
                "Write an Arduino Library", "Design a low current circuit", "Add Machine Learning (ML) to a device"
            ]
        };

        const app = document.getElementById('app');
        const scoreEl = document.getElementById('score');
        const totalEl = document.getElementById('total');
        
        // Load saved progress from localStorage
        let progress = JSON.parse(localStorage.getItem('embeddedSkills_v2')) || {};
        let totalSkills = 0;
        let completedSkills = 0;

        function updateScore() {
            scoreEl.textContent = completedSkills;
        }

        function toggleSkill(skillId, cardElement) {
            if (progress[skillId]) {
                delete progress[skillId];
                cardElement.classList.remove('completed');
                completedSkills--;
            } else {
                progress[skillId] = true;
                cardElement.classList.add('completed');
                completedSkills++;
            }
            localStorage.setItem('embeddedSkills_v2', JSON.stringify(progress));
            updateScore();
        }

        // Render the UI
        for (const [category, items] of Object.entries(skills)) {
            const section = document.createElement('div');
            section.className = 'category';
            section.innerHTML = `<h2>${category}</h2>`;
            
            const grid = document.createElement('div');
            grid.className = 'grid';

            items.forEach(skill => {
                totalSkills++;
                // Create a clean, safe ID for localStorage
                const skillId = skill.replace(/[^a-zA-Z0-9]/g, ''); 
                
                const card = document.createElement('div');
                card.className = `card ${progress[skillId] ? 'completed' : ''}`;
                card.textContent = skill;
                
                if (progress[skillId]) completedSkills++;

                card.addEventListener('click', () => toggleSkill(skillId, card));
                grid.appendChild(card);
            });

            section.appendChild(grid);
            app.appendChild(section);
        }

        totalEl.textContent = totalSkills;
        updateScore();
    </script>
</body>
</html>
